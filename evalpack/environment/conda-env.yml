name: ml-colab-eval
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - jupyterlab=4.*
  - ipykernel=6.*
  - nbclient=0.10.*
  - nbconvert=7.*
  - nbformat=5.*
  - pyyaml=6.*
  - pymupdf>=1.24
  # Runtime deps for the demo notebooks the pipeline produces.
  # These MUST be importable in the same kernel papermill runs.
  - numpy>=1.26
  - scipy>=1.11
  - matplotlib>=3.8
  - pandas>=2.1
  - scikit-learn>=1.3
  - ipywidgets>=8.1
  # Browser eval lane (Tier B): renders ipywidgets / server-apps / HTML.
  - voila>=0.5
  - pip:
      - papermill==2.6.0
      - python-dotenv>=1.0
      # Test-set collection (YouTube captions). curl_cffi pinned to the range
      # yt-dlp's impersonation backend supports (0.10–0.14; 0.15 is too new).
      - "yt-dlp[default]>=2025.1.1"
      - "curl_cffi>=0.10,<0.15"
      # Interactivity harness — browser driving + trace recording.
      # After install you MUST run:  python -m playwright install chromium
      - playwright>=1.49
      # LLM planner + judge (kept in different families for anti-bias).
      - openai>=1.55.0
      - anthropic>=0.40
      - google-genai>=0.3
